name: root_hub_web_portal
description: Lightweight Jaspr web portal for Root Hub redirects and admin pages.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.10.0

resolution: workspace

dependencies:
  jaspr: ^0.22.3
  root_hub_client:
    path: ../root_hub_client

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.4.13
  jaspr_builder: ^0.22.3
  lints: ^5.0.0

jaspr:
  mode: client

targets:
  $default:
    builders:
      slang_build_runner:
        options:
          base_locale: en
          fallback_strategy: base_locale
          input_directory: lib/src/i18n
          input_file_pattern: .json
          output_directory: lib/src/i18n
          output_file_name: strings.g.dart
          flat_map: false
          namespaces: false
          translate_var: t
          string_interpolation: braces
          flutter_integration: false
          lazy: false

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Build Root Hub Web Portal</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fff8f2;
        color: #3f2516;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(90vw, 760px);
        border: 1px solid #d5b8a4;
        border-radius: 16px;
        background: #fff;
        padding: 20px;
        box-shadow: 0 12px 24px rgba(63, 37, 22, 0.12);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 10px;
        font-size: 24px;
      }

      pre {
        margin: 0;
        padding: 12px;
        border-radius: 12px;
        background: #f4ebe4;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Root Hub web portal is not built yet.</h1>
      <p>Build the Jaspr project into the server web directory and restart the server:</p>
      <pre>cd ../root_hub_server
serverpod run web_portal_build</pre>
    </main>
  </body>
</html>

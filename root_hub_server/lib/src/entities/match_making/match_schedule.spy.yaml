class: MatchSchedulePairingAttempt
table: match_schedule_pairing_attempt
fields:
  createdAt: DateTime
  title: String
  # Max 1000 characters (validated at API boundary).
  description: String?
  minAmountOfPlayers: MatchPodium
  maxAmountOfPlayers: MatchPodium
  attemptedAt: DateTime
  status: MatchScheduleStatus, default=scheduled
  notPlayedReason: MatchScheduleNotPlayedReason?
  notPlayedReasonDetails: String?
  notPlayedMarkedByPlayerDataId: int?
  notPlayedMarkedBy: PlayerData?, relation(name=player_not_played_match_schedules, field=notPlayedMarkedByPlayerDataId)
  closedForSubscriptions: bool?
  locationId: int
  location: Location?, relation(name=pairing_attempt_location, field=locationId)
  locationAdditionalInfo: String?
  playerDataId: int
  host: PlayerData?, relation(name=hosted_pairing_attempts, field=playerDataId)
  subscriptions: List<MatchSubscription>?, relation(name=pairing_attempt_subscriptions)
  chatHistory: MatchChatHistory?, relation(name=pairing_attempt_chat_history)
  playedMatch: PlayedMatch?, relation(name=scheduled_attempt_played_match)

indexes:
  location_id_idx:
    fields: locationId
  player_data_id_idx:
    fields: playerDataId
